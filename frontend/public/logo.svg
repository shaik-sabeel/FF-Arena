<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Glow -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff5722" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ff5722" stop-opacity="0"/>
    </radialGradient>
    
    <!-- Fire Gradient -->
    <linearGradient id="fire-grad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#da1b60"/>
      <stop offset="70%" stop-color="#ff5722"/>
      <stop offset="100%" stop-color="#ffb300"/>
    </linearGradient>

    <!-- Metal Gold Gradient -->
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffb300"/>
      <stop offset="50%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#ff8f00"/>
    </linearGradient>

    <!-- Shield Border Gradient -->
    <linearGradient id="border-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#ff5722"/>
    </linearGradient>
  </defs>

  <!-- Background radial glow -->
  <circle cx="256" cy="256" r="220" fill="url(#glow)"/>

  <g transform="translate(0, -10)">
    <!-- Outer Shield / Crest -->
    <path d="M 256 50 
             C 380 90, 410 110, 420 220 
             C 420 340, 340 420, 256 460 
             C 172 420, 92 340, 92 220 
             C 102 110, 132 90, 256 50 Z" 
          fill="#0f111a" stroke="url(#border-grad)" stroke-width="8" stroke-linejoin="round" />

    <!-- Inner Shield Accent -->
    <path d="M 256 70 
             C 350 105, 380 120, 390 215 
             C 390 315, 320 385, 256 425 
             C 192 385, 122 315, 122 215 
             C 132 120, 162 105, 256 70 Z" 
          fill="#08090c" stroke="#1e2235" stroke-width="4" />

    <!-- Fire Wings / Flames in Background -->
    <path d="M 200 240 C 170 170, 120 180, 150 120 C 180 150, 190 190, 210 200 C 190 140, 220 100, 256 80 C 292 100, 322 140, 302 200 C 322 190, 332 150, 362 120 C 392 180, 342 170, 312 240 Z" 
          fill="url(#fire-grad)" opacity="0.85"/>

    <!-- Trophy / Cup Icon in Center -->
    <path d="M 206 180 L 306 180 L 296 260 C 296 285, 276 300, 256 300 C 236 300, 216 285, 216 260 Z" 
          fill="url(#gold-grad)"/>
    <path d="M 246 300 L 266 300 L 266 330 L 286 330 L 286 350 L 226 350 L 226 330 L 246 330 Z" 
          fill="url(#gold-grad)"/>
    <!-- Trophy Handles -->
    <path d="M 206 190 C 180 190, 180 230, 208 240 M 306 190 C 332 190, 332 230, 304 240" 
          fill="none" stroke="url(#gold-grad)" stroke-width="6" stroke-linecap="round"/>

    <!-- Five Stars Above Trophy -->
    <path d="M 256 125 L 260 135 L 270 135 L 262 141 L 265 150 L 256 144 L 247 150 L 250 141 L 242 135 L 252 135 Z" fill="#fff"/>
    <path d="M 216 135 L 219 143 L 227 143 L 220 148 L 222 156 L 216 151 L 210 156 L 212 148 L 205 143 L 213 143 Z" fill="#fff" opacity="0.8" transform="rotate(-15, 216, 135)"/>
    <path d="M 296 135 L 299 143 L 307 143 L 300 148 L 302 156 L 296 151 L 290 156 L 292 148 L 285 143 L 293 143 Z" fill="#fff" opacity="0.8" transform="rotate(15, 296, 135)"/>

    <!-- Glowing Text Banner -->
    <rect x="146" y="360" width="220" height="40" rx="8" fill="#161821" stroke="#ff5722" stroke-width="2" />
    <text x="256" y="386" font-family="'Outfit', sans-serif" font-weight="900" font-size="20" fill="#fff" text-anchor="middle" letter-spacing="4">
      ARENA
    </text>
  </g>
</svg>
